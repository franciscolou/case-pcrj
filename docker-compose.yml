services:
  backend:
    image: franciscolou/pcrj-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      JWT_SECRET: "painel-pcrj-secret-2024"
      CORS_ORIGIN: "http://localhost:3000"
      DB_PATH: "/app/data/children.db"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: franciscolou/pcrj-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "production"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
