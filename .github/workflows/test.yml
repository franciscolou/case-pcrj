name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install and start backend
        working-directory: backend
        run: |
          npm ci
          npm run build
          node dist/server.js &
        env:
          PORT: 3001
          HOST: 0.0.0.0
          JWT_SECRET: test-secret-ci
          CORS_ORIGIN: http://localhost:3000
          DB_PATH: /tmp/e2e-test.db
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps (postinstall baixa o Chromium)
        run: npm ci
        working-directory: frontend
      - name: Install Playwright OS dependencies
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && echo "Backend ready" && exit 0
            echo "Waiting... ($i/30)"
            sleep 1
          done
          echo "Backend did not start in time" && exit 1
      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
